<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Chatbot</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#0f172a;
    color:white;
    height:100vh;
    overflow:hidden;
}

.container{
    display:flex;
    height:100vh;
}

/* SIDEBAR */

.sidebar{
    width:300px;
    background:#111827;
    border-right:1px solid #1f2937;
    display:flex;
    flex-direction:column;
    padding:20px;
}

.logo{
    font-size:24px;
    font-weight:bold;
    color:#60a5fa;
    margin-bottom:20px;
}

.new-chat{
    padding:12px;
    background:#2563eb;
    border:none;
    color:white;
    border-radius:10px;
    cursor:pointer;
    margin-bottom:20px;
}

.new-chat:hover{
    background:#1d4ed8;
}

.history-title{
    margin-bottom:10px;
    color:#9ca3af;
    font-size:14px;
}

.history{
    flex:1;
    overflow-y:auto;
}

.history-item{
    background:#1f2937;
    padding:12px;
    border-radius:10px;
    margin-bottom:10px;
    cursor:pointer;
}

.history-item:hover{
    background:#374151;
}

/* CHAT AREA */

.chat{
    flex:1;
    display:flex;
    flex-direction:column;
}

.topbar{
    padding:20px;
    border-bottom:1px solid #1f2937;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.status{
    color:#22c55e;
}

.messages{
    flex:1;
    overflow-y:auto;
    padding:20px;
    display:flex;
    flex-direction:column;
    gap:15px;
}

.message{
    max-width:75%;
    padding:14px;
    border-radius:14px;
    line-height:1.5;
}

.user{
    align-self:flex-end;
    background:#2563eb;
}

.bot{
    align-self:flex-start;
    background:#1e293b;
}

.input-area{
    padding:20px;
    border-top:1px solid #1f2937;
    background:#111827;
}

.input-box{
    display:flex;
    gap:10px;
    background:#1f2937;
    padding:10px;
    border-radius:12px;
}

textarea{
    flex:1;
    border:none;
    background:transparent;
    color:white;
    resize:none;
    outline:none;
    font-size:16px;
}

button.send{
    width:50px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    cursor:pointer;
    font-size:18px;
}

button.send:hover{
    background:#1d4ed8;
}

.typing{
    display:flex;
    gap:5px;
}

.typing span{
    width:8px;
    height:8px;
    border-radius:50%;
    background:white;
    animation:bounce 1.2s infinite;
}

.typing span:nth-child(2){
    animation-delay:.2s;
}

.typing span:nth-child(3){
    animation-delay:.4s;
}

@keyframes bounce{
    0%,80%,100%{
        transform:scale(.7);
        opacity:.5;
    }
    40%{
        transform:scale(1);
        opacity:1;
    }
}

@media(max-width:768px){

    .sidebar{
        display:none;
    }

    .message{
        max-width:90%;
    }

}

</style>
</head>
<body>

<div class="container">

    <!-- SIDEBAR -->

    <div class="sidebar">

        <div class="logo">AI Chatbot</div>

        <button class="new-chat" onclick="newChat()">
            + New Chat
        </button>

        <div class="history-title">History</div>

        <div class="history" id="history"></div>

    </div>

    <!-- CHAT -->

    <div class="chat">

        <div class="topbar">
            <h2>Assistant</h2>
            <div class="status">● Online</div>
        </div>

        <div class="messages" id="messages">

            <div class="message bot">
                Hello 👋 <br>
                How can I help you today?
            </div>

        </div>

        <div class="input-area">

            <div class="input-box">

                <textarea
                    id="input"
                    rows="1"
                    placeholder="Type message..."
                ></textarea>

                <button class="send" onclick="sendMessage()">
                    ➤
                </button>

            </div>

        </div>

    </div>

</div>

<script>

const messages = document.getElementById("messages");
const input = document.getElementById("input");
const historyBox = document.getElementById("history");

/* LOAD HISTORY */

let historyData = JSON.parse(localStorage.getItem("chatHistory")) || [];

renderHistory();

/* ADD MESSAGE */

function addMessage(text,type){

    const div = document.createElement("div");

    div.classList.add("message");

    if(type === "user"){
        div.classList.add("user");
    }else{
        div.classList.add("bot");
    }

    div.innerHTML = text;

    messages.appendChild(div);

    messages.scrollTop = messages.scrollHeight;
}

/* TYPING */

function showTyping(){

    const div = document.createElement("div");

    div.classList.add("message","bot");

    div.id = "typing";

    div.innerHTML = `
        <div class="typing">
            <span></span>
            <span></span>
            <span></span>
        </div>
    `;

    messages.appendChild(div);

    messages.scrollTop = messages.scrollHeight;
}

function removeTyping(){

    const typing = document.getElementById("typing");

    if(typing){
        typing.remove();
    }
}

/* SEND MESSAGE */

async function sendMessage(){

    const text = input.value.trim();

    if(text === "") return;

    addMessage(text,"user");

    saveHistory(text);

    input.value = "";

    showTyping();

    try{

        const response = await fetch("http://127.0.0.1:5000/api/chat",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                message:text
            })

        });

        const data = await response.json();

        removeTyping();

        if(data.response){

            addMessage(data.response,"bot");

        }else{

            addMessage("Error: "+data.error,"bot");

        }

    }catch(error){

        removeTyping();

        addMessage("Server connection failed.","bot");

        console.log(error);

    }

}

/* SAVE HISTORY */

function saveHistory(text){

    historyData.unshift(text);

    localStorage.setItem(
        "chatHistory",
        JSON.stringify(historyData)
    );

    renderHistory();
}

/* RENDER HISTORY */

function renderHistory(){

    historyBox.innerHTML = "";

    historyData.forEach(item=>{

        const div = document.createElement("div");

        div.classList.add("history-item");

        div.innerText = item;

        historyBox.appendChild(div);

    });

}

/* NEW CHAT */

function newChat(){

    messages.innerHTML = `
        <div class="message bot">
            New chat started 🚀
        </div>
    `;
}

/* ENTER KEY */

input.addEventListener("keydown",function(e){

    if(e.key === "Enter" && !e.shiftKey){

        e.preventDefault();

        sendMessage();
    }

});

</script>

</body>
</html>
