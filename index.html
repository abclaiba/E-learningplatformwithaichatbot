<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI eLearning Chatbot</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#eef2ff;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.chat-container{
    width:420px;
    height:700px;
    background:white;
    border-radius:20px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.chat-header{
    background:linear-gradient(135deg,#4f46e5,#7c3aed);
    color:white;
    padding:20px;
    text-align:center;
}

.chat-header h2{
    font-size:24px;
}

.chat-header p{
    margin-top:5px;
    font-size:14px;
}

.chat-box{
    flex:1;
    padding:15px;
    overflow-y:auto;
    background:#f8fafc;
}

.message{
    padding:12px 15px;
    margin-bottom:12px;
    border-radius:14px;
    max-width:80%;
    line-height:1.5;
}

.bot{
    background:#e0e7ff;
    color:#111;
    border-bottom-left-radius:5px;
}

.user{
    background:#4f46e5;
    color:white;
    margin-left:auto;
    border-bottom-right-radius:5px;
}

.chat-input{
    display:flex;
    padding:12px;
    border-top:1px solid #ddd;
    background:white;
}

.chat-input input{
    flex:1;
    padding:12px;
    border:1px solid #ccc;
    border-radius:10px;
    outline:none;
}

.chat-input button{
    margin-left:10px;
    padding:12px 18px;
    background:#4f46e5;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.chat-input button:hover{
    background:#4338ca;
}

.quiz-box{
    background:white;
    border:1px solid #ddd;
    border-radius:12px;
    padding:15px;
    margin-top:10px;
}

.quiz-option{
    background:#eef2ff;
    padding:10px;
    border-radius:8px;
    margin-top:10px;
    cursor:pointer;
    transition:0.3s;
}

.quiz-option:hover{
    background:#c7d2fe;
}

.correct{
    background:#22c55e !important;
    color:white;
}

.wrong{
    background:#ef4444 !important;
    color:white;
}

</style>
</head>

<body>

<div class="chat-container">

    <div class="chat-header">
        <h2>AI Learning Assistant</h2>
        <p>Ask Questions • Take Quiz • Learn Faster</p>
    </div>

    <div class="chat-box" id="chatBox">

        <div class="message bot">
            👋 Welcome Student!<br><br>
            Type:
            <br><br>
            • <b>html</b>
            <br>
            • <b>css</b>
            <br>
            • <b>javascript</b>
            <br>
            • <b>python</b>
            <br>
            • <b>quiz</b>
        </div>

    </div>

    <div class="chat-input">
        <input type="text" id="userInput" placeholder="Ask something...">
        <button id="sendBtn">Send</button>
    </div>

</div>

<script>

const chatBox = document.getElementById("chatBox");
const input = document.getElementById("userInput");
const sendBtn = document.getElementById("sendBtn");

function addMessage(text, sender){

    const div = document.createElement("div");

    div.classList.add("message");
    div.classList.add(sender);

    div.innerHTML = text;

    chatBox.appendChild(div);

    chatBox.scrollTop = chatBox.scrollHeight;
}

function sendMessage(){

    const text = input.value.trim();

    if(text === "") return;

    addMessage(text, "user");

    input.value = "";

    handleBotReply(text.toLowerCase());
}

function handleBotReply(text){

    if(text.includes("html")){

        addMessage("HTML creates the structure of webpages.", "bot");
    }

    else if(text.includes("css")){

        addMessage("CSS styles and designs webpages.", "bot");
    }

    else if(text.includes("javascript")){

        addMessage("JavaScript makes websites interactive.", "bot");
    }

    else if(text.includes("python")){

        addMessage("Python is widely used in AI and backend development.", "bot");
    }

    else if(text.includes("quiz")){

        showQuiz();
    }

    else{

        addMessage("🤖 Ask about coding topics or type 'quiz' to start.", "bot");
    }
}

function showQuiz(){

    const quizDiv = document.createElement("div");

    quizDiv.classList.add("message","bot");

    quizDiv.innerHTML = `
    
    <div class="quiz-box">
    
        <h4>📘 Quiz Question</h4>

        <p style="margin-top:10px;">
            What does CSS stand for?
        </p>

        <div class="quiz-option">Creative Style Sheets</div>

        <div class="quiz-option correct-answer">
            Cascading Style Sheets
        </div>

        <div class="quiz-option">Computer Style Syntax</div>

        <div class="quiz-option">Colorful Style System</div>

    </div>
    `;

    chatBox.appendChild(quizDiv);

    const options = quizDiv.querySelectorAll(".quiz-option");

    options.forEach(option => {

        option.addEventListener("click", () => {

            options.forEach(opt => {

                opt.style.pointerEvents = "none";

                if(opt.classList.contains("correct-answer")){

                    opt.classList.add("correct");

                }
            });

            if(option.classList.contains("correct-answer")){

                option.classList.add("correct");

            }else{

                option.classList.add("wrong");
            }
        });
    });

    chatBox.scrollTop = chatBox.scrollHeight;
}

sendBtn.addEventListener("click", sendMessage);

input.addEventListener("keypress", function(e){

    if(e.key === "Enter"){

        sendMessage();
    }
});

</script>

</body>
</html>
